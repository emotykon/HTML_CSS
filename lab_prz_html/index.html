<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OtoPromotor - Video Player</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="video-container">
      <section class="main-content">
        <div class="video-player">
          <img
            src="https://via.placeholder.com/1280x720"
            alt="Video Placeholder"
          />
        </div>
        <div class="video-info">
          <h1>Jak znaleźć idealnego promotora?</h1>
          <div class="meta">125 tys. wyświetleń • 2 dni temu</div>
        </div>
      </section>

      <aside class="sidebar">
        <div class="suggestion-card">
          <img src="https://via.placeholder.com/160x90" alt="Thumbnail" />
          <div class="suggestion-info">
            <h4>Seminarium vs Proseminarium</h4>
            <p>Kanał Edukacyjny</p>
            <span>10 tys. wyświetleń</span>
          </div>
        </div>

        <div class="suggestion-card">
          <img src="https://via.placeholder.com/160x90" alt="Thumbnail" />
          <div class="suggestion-info">
            <h4>Jak pisać pracę dyplomową</h4>
            <p>Poradnik Studenta</p>
            <span>50 tys. wyświetleń</span>
          </div>
        </div>
      </aside>
    </main>
  </body>
</html>
